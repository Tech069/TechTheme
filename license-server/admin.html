<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Avtix License Manager</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,-apple-system,sans-serif;background:#0c0a09;color:#fff;min-height:100vh}
.header{background:#18181b;border-bottom:1px solid #27272a;padding:20px 30px;display:flex;justify-content:space-between;align-items:center}
.header h1{font-size:20px;color:#a78bfa}
.header .badge{background:#6366f1;color:#fff;padding:4px 12px;border-radius:20px;font-size:12px}
.container{max-width:900px;margin:30px auto;padding:0 20px}
.login-box{background:#18181b;border:1px solid #27272a;border-radius:12px;padding:40px;max-width:400px;margin:60px auto;text-align:center}
.login-box input{width:100%;padding:12px;border:1px solid #27272a;border-radius:8px;background:#0c0a09;color:#fff;margin:10px 0;font-size:14px}
.login-box button{width:100%;padding:12px;border:none;border-radius:8px;background:#6366f1;color:#fff;font-size:14px;cursor:pointer;margin-top:10px}
.login-box button:hover{background:#818cf8}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:15px;margin-bottom:30px}
.stat{background:#18181b;border:1px solid #27272a;border-radius:10px;padding:20px;text-align:center}
.stat .num{font-size:28px;font-weight:700;color:#a78bfa}
.stat .label{font-size:12px;color:#71717a;margin-top:5px}
.panel{background:#18181b;border:1px solid #27272a;border-radius:12px;padding:24px;margin-bottom:20px}
.panel h2{font-size:16px;margin-bottom:16px;color:#e4e4e7}
.form-row{display:flex;gap:10px;margin-bottom:12px}
.form-row input{flex:1;padding:10px;border:1px solid #27272a;border-radius:8px;background:#0c0a09;color:#fff;font-size:13px}
.form-row button{padding:10px 20px;border:none;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600}
.btn-primary{background:#6366f1;color:#fff}.btn-primary:hover{background:#818cf8}
.btn-danger{background:#7f1d1d;color:#fff}.btn-danger:hover{background:#991b1b}
.btn-success{background:#166534;color:#fff}.btn-success:hover{background:#15803d}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:10px;font-size:12px;color:#71717a;border-bottom:1px solid #27272a}
td{padding:10px;border-bottom:1px solid #1c1917;font-size:13px}
.status{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:6px}
.status.active{background:#22c55e}.status.inactive{background:#ef4444}
.copy-btn{background:#27272a;border:1px solid #3f3f46;color:#a1a1aa;padding:3px 8px;border-radius:4px;cursor:pointer;font-size:11px}
.copy-btn:hover{background:#3f3f46}
.hidden{display:none}
.toast{position:fixed;top:20px;right:20px;background:#166534;color:#fff;padding:12px 20px;border-radius:8px;font-size:13px;z-index:999;display:none}
</style>
</head>
<body>
<div class="header">
  <h1>Avtix License Manager</h1>
  <span class="badge" id="versionBadge">v2.0</span>
</div>

<!-- Login -->
<div id="loginView" class="container">
  <div class="login-box">
    <h2 style="margin-bottom:20px">Admin Login</h2>
    <input type="password" id="adminKeyInput" placeholder="Admin Key" onkeydown="if(event.key==='Enter')doLogin()">
    <button onclick="doLogin()">Login</button>
  </div>
</div>

<!-- Dashboard -->
<div id="dashboardView" class="container hidden">
  <div class="stats">
    <div class="stat"><div class="num" id="statTotal">0</div><div class="label">Total IPs</div></div>
    <div class="stat"><div class="num" id="statActive">0</div><div class="label">Active IPs</div></div>
    <div class="stat"><div class="num" id="statLicenses">0</div><div class="label">Licenses</div></div>
  </div>

  <!-- Add IP -->
  <div class="panel">
    <h2>Add IP Address</h2>
    <div class="form-row">
      <input type="text" id="newIp" placeholder="IP address (e.g. 45.131.64.100)">
      <input type="text" id="newLabel" placeholder="Label (optional)">
      <button class="btn-primary" onclick="addIP()">Add</button>
      <button class="btn-success" onclick="addWildcard()" title="Allow ALL IPs">Allow All (*)</button>
    </div>
    <div class="form-row" style="margin-top:8px">
      <textarea id="bulkIps" placeholder="Bulk add: one IP per line" style="flex:1;padding:10px;border:1px solid #27272a;border-radius:8px;background:#0c0a09;color:#fff;font-size:13px;height:80px;resize:vertical"></textarea>
      <button class="btn-primary" onclick="bulkAdd()" style="align-self:flex-end">Bulk Add</button>
    </div>
  </div>

  <!-- IP List -->
  <div class="panel">
    <h2>Authorized IPs</h2>
    <table>
      <thead><tr><th>Status</th><th>IP Address</th><th>Label</th><th>Added</th><th>Actions</th></tr></thead>
      <tbody id="ipTable"></tbody>
    </table>
    <div id="noIps" style="text-align:center;padding:20px;color:#71717a">No IPs added yet</div>
  </div>

  <!-- Install Command -->
  <div class="panel">
    <h2>Install Command</h2>
    <div style="background:#0c0a09;border:1px solid #27272a;border-radius:8px;padding:15px;font-family:monospace;font-size:12px;word-break:break-all;position:relative">
      <code id="installCmd">curl -fsSL https://raw.githubusercontent.com/CodeByCruel/AvtixTheme/main/install.sh | sudo bash</code>
      <button class="copy-btn" style="position:absolute;top:8px;right:8px" onclick="copyCmd()">Copy</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let ADMIN_KEY = '';
const API = './api.php';

function toast(msg, color='green') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = color === 'red' ? '#7f1d1d' : '#166534';
  t.style.display = 'block';
  setTimeout(() => t.style.display='none', 3000);
}

function doLogin() {
  ADMIN_KEY = document.getElementById('adminKeyInput').value;
  if (!ADMIN_KEY) return;
  api('stats').then(r => {
    if (r.error) { toast(r.error, 'red'); return; }
    document.getElementById('loginView').classList.add('hidden');
    document.getElementById('dashboardView').classList.remove('hidden');
    document.getElementById('statTotal').textContent = r.total_ips;
    document.getElementById('statActive').textContent = r.active_ips;
    document.getElementById('statLicenses').textContent = r.total_licenses;
    document.getElementById('versionBadge').textContent = 'v' + r.version;
    loadIPs();
  }).catch(() => toast('Wrong key', 'red'));
}

async function api(action, data={}) {
  const resp = await fetch(API, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({action, admin_key: ADMIN_KEY, ...data})
  });
  return resp.json();
}

async function loadIPs() {
  const r = await api('list_ips');
  const tbody = document.getElementById('ipTable');
  tbody.innerHTML = '';
  const ips = r.ips || {};
  document.getElementById('noIps').style.display = Object.keys(ips).length ? 'none' : 'block';
  for (const [ip, data] of Object.entries(ips)) {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td><span class="status ${data.active?'active':'inactive'}"></span>${data.active?'Active':'Inactive'}</td>
      <td><code>${ip}</code></td>
      <td>${data.label||''}</td>
      <td>${data.added||''}</td>
      <td>
        <button class="copy-btn" onclick="toggleIP('${ip}')">${data.active?'Disable':'Enable'}</button>
        <button class="copy-btn" onclick="removeIP('${ip}')" style="color:#ef4444;border-color:#7f1d1d">Remove</button>
      </td>`;
    tbody.appendChild(tr);
  }
}

async function addIP() {
  const ip = document.getElementById('newIp').value.trim();
  const label = document.getElementById('newLabel').value.trim();
  if (!ip) return toast('Enter an IP', 'red');
  const r = await api('add_ip', {ip, label});
  r.success ? (toast(r.message), document.getElementById('newIp').value='', document.getElementById('newLabel').value='', loadIPs()) : toast(r.error, 'red');
}

async function addWildcard() {
  if (!confirm('Allow ALL IPs to install? This removes IP protection.')) return;
  const r = await api('add_ip', {ip: '*', label: 'wildcard - all IPs'});
  r.success ? (toast('Wildcard added'), loadIPs()) : toast(r.error, 'red');
}

async function bulkAdd() {
  const text = document.getElementById('bulkIps').value;
  const ips = text.split('\n').map(s=>s.trim()).filter(s=>s);
  if (!ips.length) return toast('No IPs to add', 'red');
  const r = await api('bulk_add', {ips});
  r.success ? (toast(`Added ${r.added} IPs`), document.getElementById('bulkIps').value='', loadIPs()) : toast(r.error, 'red');
}

async function removeIP(ip) {
  if (!confirm(`Remove IP ${ip}?`)) return;
  const r = await api('remove_ip', {ip});
  r.success ? (toast(r.message), loadIPs()) : toast(r.error, 'red');
}

async function toggleIP(ip) {
  const r = await api('toggle_ip', {ip});
  r.success ? loadIPs() : toast(r.error, 'red');
}

function copyCmd() {
  navigator.clipboard.writeText(document.getElementById('installCmd').textContent);
  toast('Copied!');
}
</script>
</body>
</html>
