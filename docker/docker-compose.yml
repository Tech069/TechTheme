x-common:
  database:
    &db-environment
    MYSQL_PASSWORD: &db-password "CHANGE_ME"
    MYSQL_ROOT_PASSWORD: "CHANGE_ME_TOO"
  panel:
    &panel-environment
    APP_URL: "http://localhost:8080"
    APP_TIMEZONE: "UTC"
    APP_SERVICE_AUTHOR: "admin@localhost"
    DB_PASSWORD: *db-password
    APP_ENV: "production"
    APP_ENVIRONMENT_ONLY: "false"
    CACHE_DRIVER: "redis"
    SESSION_DRIVER: "redis"
    QUEUE_DRIVER: "redis"
    REDIS_HOST: "cache"
    DB_HOST: "database"
    DB_PORT: "3306"
    HASHIDS_LENGTH: 8
  mail:
    &mail-environment
    MAIL_FROM: "noreply@localhost"
    MAIL_DRIVER: "smtp"
    MAIL_HOST: "mail"
    MAIL_PORT: "1025"
    MAIL_USERNAME: ""
    MAIL_PASSWORD: ""
    MAIL_ENCRYPTION: "true"

services:
  database:
    image: mariadb:11
    restart: always
    command: --default-authentication-plugin=mysql_native_password
    volumes:
      - "./data/database:/var/lib/mysql"
    environment:
      <<: *db-environment
      MYSQL_DATABASE: "panel"
      MYSQL_USER: "pterodactyl"
    networks:
      internal:

  cache:
    image: redis:alpine
    restart: always
    networks:
      internal:

  panel:
    image: ghcr.io/pterodactyl/panel:latest
    restart: always
    ports:
      - "8080:80"
      - "8443:443"
    links:
      - database
      - cache
    volumes:
      - "./data/var/:/app/var/"
      - "./data/nginx/:/etc/nginx/http.d/"
      - "./data/certs/:/etc/letsencrypt/"
      - "./data/logs/:/app/storage/logs"
    environment:
      <<: [*panel-environment, *mail-environment]
    depends_on:
      - database
      - cache
    networks:
      internal:

networks:
  internal:
    ipam:
      config:
        - subnet: 172.20.0.0/16
